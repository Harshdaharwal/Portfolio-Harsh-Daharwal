<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 380" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15803d"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
  </defs>
  <rect width="660" height="380" fill="url(#bg)"/>
  <!-- subtle grid pattern -->
  <g opacity="0.08" stroke="#ffffff">
    <path d="M0 60 H660 M0 120 H660 M0 180 H660 M0 240 H660 M0 300 H660"/>
    <path d="M80 0 V380 M160 0 V380 M240 0 V380 M320 0 V380 M400 0 V380 M480 0 V380 M560 0 V380"/>
  </g>
  <!-- header label -->
  <text x="40" y="50" font-family="'Space Grotesk',sans-serif" font-size="13" letter-spacing="3" fill="#dcfce7" font-weight="700">GOOGLE SHEETS · EXCEL</text>
  <text x="40" y="85" font-family="'Space Grotesk',sans-serif" font-size="26" fill="#ffffff" font-weight="800">Live Dashboards &amp; Macros</text>
  <!-- spreadsheet card -->
  <g transform="translate(40,110)">
    <rect width="580" height="240" rx="12" fill="url(#sheet)" stroke="#15803d" stroke-opacity="0.25"/>
    <!-- toolbar -->
    <rect x="0" y="0" width="580" height="32" rx="12" fill="#16a34a"/>
    <rect x="0" y="16" width="580" height="16" fill="#16a34a"/>
    <circle cx="14" cy="16" r="4" fill="#86efac"/>
    <circle cx="28" cy="16" r="4" fill="#bbf7d0"/>
    <circle cx="42" cy="16" r="4" fill="#dcfce7"/>
    <text x="70" y="20" font-family="'Fira Code',monospace" font-size="11" fill="#dcfce7">=QUERY(Sales!A:F, "select B, sum(E) group by B")</text>
    <!-- column headers -->
    <g fill="#bbf7d0" opacity="0.5">
      <rect x="0" y="32" width="580" height="22"/>
    </g>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#166534" font-weight="700">
      <text x="20" y="47">A</text><text x="110" y="47">B</text><text x="210" y="47">C</text><text x="310" y="47">D</text><text x="410" y="47">E</text><text x="500" y="47">F</text>
    </g>
    <!-- row data -->
    <g font-family="'Fira Code',monospace" font-size="11" fill="#0f172a">
      <text x="10" y="80">Region</text><text x="90" y="80">Q1</text><text x="180" y="80">Q2</text><text x="280" y="80">Q3</text><text x="380" y="80">Q4</text><text x="480" y="80">YoY%</text>
      <text x="10" y="108">North</text><text x="90" y="108">₹42K</text><text x="180" y="108">₹51K</text><text x="280" y="108">₹68K</text><text x="380" y="108">₹74K</text><text x="480" y="108" fill="#16a34a" font-weight="700">+18%</text>
      <text x="10" y="136">South</text><text x="90" y="136">₹38K</text><text x="180" y="136">₹40K</text><text x="280" y="136">₹47K</text><text x="380" y="136">₹55K</text><text x="480" y="136" fill="#16a34a" font-weight="700">+22%</text>
      <text x="10" y="164">East</text><text x="90" y="164">₹29K</text><text x="180" y="164">₹35K</text><text x="280" y="164">₹39K</text><text x="380" y="164">₹46K</text><text x="480" y="164" fill="#16a34a" font-weight="700">+15%</text>
      <text x="10" y="192">West</text><text x="90" y="192">₹51K</text><text x="180" y="192">₹58K</text><text x="280" y="192">₹65K</text><text x="380" y="192">₹71K</text><text x="480" y="192" fill="#16a34a" font-weight="700">+12%</text>
    </g>
    <!-- mini bars at bottom -->
    <g transform="translate(20,205)">
      <rect width="44" height="22" rx="2" fill="#16a34a" opacity="0.8"/>
      <rect x="55" width="44" height="18" y="4" rx="2" fill="#22c55e" opacity="0.7"/>
      <rect x="110" width="44" height="26" y="-4" rx="2" fill="#16a34a"/>
      <rect x="165" width="44" height="20" y="2" rx="2" fill="#22c55e" opacity="0.7"/>
      <rect x="220" width="44" height="14" y="8" rx="2" fill="#86efac"/>
      <rect x="275" width="44" height="22" rx="2" fill="#16a34a" opacity="0.8"/>
      <rect x="330" width="44" height="28" y="-6" rx="2" fill="#15803d"/>
      <rect x="385" width="44" height="16" y="6" rx="2" fill="#22c55e" opacity="0.7"/>
      <rect x="440" width="44" height="24" y="-2" rx="2" fill="#16a34a"/>
      <rect x="495" width="44" height="20" y="2" rx="2" fill="#22c55e" opacity="0.7"/>
    </g>
  </g>
</svg>
