<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 380" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9d174d"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbcfe8"/>
      <stop offset="1" stop-color="#db2777"/>
    </radialGradient>
  </defs>
  <rect width="660" height="380" fill="url(#bg3)"/>
  <!-- glow blobs -->
  <circle cx="540" cy="70" r="100" fill="#f9a8d4" opacity="0.22"/>
  <circle cx="120" cy="320" r="90" fill="#f472b6" opacity="0.18"/>
  <text x="40" y="50" font-family="'Space Grotesk',sans-serif" font-size="13" letter-spacing="3" fill="#fce7f3" font-weight="700">AI CHATBOTS · VOICE AGENTS</text>
  <text x="40" y="85" font-family="'Space Grotesk',sans-serif" font-size="26" fill="#ffffff" font-weight="800">Chat &amp; Voice on RAG</text>
  <!-- chat thread -->
  <g transform="translate(40,110)" font-family="'Space Grotesk',sans-serif">
    <!-- bot msg -->
    <rect width="300" height="42" rx="14" fill="#ffffff"/>
    <text x="18" y="20" font-size="10" letter-spacing="2" fill="#9d174d" font-weight="700">AI · WHATSAPP</text>
    <text x="18" y="36" font-size="13" fill="#0f172a" font-weight="600">Hi! How can I help you today?</text>
    <!-- user msg -->
    <g transform="translate(180,54)">
      <rect width="240" height="42" rx="14" fill="#fbcfe8"/>
      <text x="18" y="20" font-size="10" letter-spacing="2" fill="#9d174d" font-weight="700">USER</text>
      <text x="18" y="36" font-size="13" fill="#0f172a" font-weight="600">Book a demo for tomorrow 4pm</text>
    </g>
    <!-- bot reply -->
    <g transform="translate(0,108)">
      <rect width="380" height="62" rx="14" fill="#ffffff"/>
      <text x="18" y="20" font-size="10" letter-spacing="2" fill="#9d174d" font-weight="700">AI · RAG GROUNDED</text>
      <text x="18" y="38" font-size="13" fill="#0f172a" font-weight="600">Booked. Calendar invite sent to</text>
      <text x="18" y="55" font-size="13" fill="#0f172a" font-weight="600">your email. Want a reminder call?</text>
    </g>
  </g>
  <!-- voice agent panel -->
  <g transform="translate(440,110)">
    <rect width="180" height="170" rx="16" fill="#ffffff" opacity="0.96"/>
    <text x="90" y="28" text-anchor="middle" font-family="'Fira Code',monospace" font-size="10" letter-spacing="2" fill="#9d174d" font-weight="700">VOICE AGENT</text>
    <!-- orb -->
    <circle cx="90" cy="80" r="34" fill="url(#orb)"/>
    <circle cx="90" cy="80" r="44" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.6"/>
    <circle cx="90" cy="80" r="54" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.35"/>
    <!-- waveform -->
    <g transform="translate(20,128)" fill="#db2777">
      <rect width="6" height="10" y="4" rx="2"/>
      <rect x="12" width="6" height="20" y="-1" rx="2"/>
      <rect x="24" width="6" height="14" y="2" rx="2"/>
      <rect x="36" width="6" height="26" y="-5" rx="2"/>
      <rect x="48" width="6" height="16" y="1" rx="2"/>
      <rect x="60" width="6" height="22" y="-2" rx="2"/>
      <rect x="72" width="6" height="12" y="3" rx="2"/>
      <rect x="84" width="6" height="24" y="-4" rx="2"/>
      <rect x="96" width="6" height="18" y="0" rx="2"/>
      <rect x="108" width="6" height="14" y="2" rx="2"/>
      <rect x="120" width="6" height="22" y="-2" rx="2"/>
      <rect x="132" width="6" height="10" y="4" rx="2"/>
    </g>
    <text x="90" y="162" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#9d174d" font-weight="700">VAPI · ELEVENLABS · TWILIO</text>
  </g>
  <!-- bottom tag strip -->
  <g transform="translate(40,300)" font-family="'Fira Code',monospace" font-size="10" font-weight="700">
    <rect width="92" height="22" rx="11" fill="#ffffff" opacity="0.95"/>
    <text x="46" y="15" text-anchor="middle" fill="#9d174d">OPENAI</text>
    <rect x="102" width="100" height="22" rx="11" fill="#ffffff" opacity="0.95"/>
    <text x="152" y="15" text-anchor="middle" fill="#9d174d">LANGCHAIN</text>
    <rect x="212" width="68" height="22" rx="11" fill="#ffffff" opacity="0.95"/>
    <text x="246" y="15" text-anchor="middle" fill="#9d174d">RAG</text>
    <rect x="290" width="92" height="22" rx="11" fill="#ffffff" opacity="0.95"/>
    <text x="336" y="15" text-anchor="middle" fill="#9d174d">WHATSAPP</text>
  </g>
</svg>
